# =============================================================================
# Orbis — GitHub Actions CI/CD
# =============================================================================
# Trigger:
#   - Push auf main → Build + Test
#   - Tag v*.*.* → Build + GitHub Release mit Binaries
# =============================================================================

name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: orbis-windows-x86_64
            binary: orbis.exe
            archive: zip

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: orbis-linux-x86_64
            binary: orbis
            archive: tar.gz

    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4

      # Linux: Systemabhängigkeiten für winit (X11/Wayland)
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxi-dev libxcursor-dev libxrandr-dev \
            libwayland-dev libxkbcommon-dev \
            pkg-config

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build Release
        run: cargo build --release --target ${{ matrix.target }}

      # Release-Ordner zusammenstellen
      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p release/${{ matrix.artifact }}
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} release/${{ matrix.artifact }}/
          cp -r assets release/${{ matrix.artifact }}/
          cp README.md release/${{ matrix.artifact }}/ 2>/dev/null || true
          cp LICENSE release/${{ matrix.artifact }}/ 2>/dev/null || true
          cd release && tar -czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}/

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "release\${{ matrix.artifact }}" -Force
          Copy-Item "target\${{ matrix.target }}\release\${{ matrix.binary }}" "release\${{ matrix.artifact }}\"
          Copy-Item -Recurse "assets" "release\${{ matrix.artifact }}\assets"
          if (Test-Path "README.md") { Copy-Item "README.md" "release\${{ matrix.artifact }}\" }
          if (Test-Path "LICENSE") { Copy-Item "LICENSE" "release\${{ matrix.artifact }}\" }
          Compress-Archive -Path "release\${{ matrix.artifact }}" -DestinationPath "release\${{ matrix.artifact }}.zip"

      # Artefakte hochladen (für jeden Build verfügbar)
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/${{ matrix.artifact }}.${{ matrix.archive }}

  # =================================================================
  # GitHub Release erstellen (nur bei Tag-Push)
  # =================================================================
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
