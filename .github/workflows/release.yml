# =============================================================================
# Orbis — CI/CD: Build + Release (Windows + Linux)
# =============================================================================
# Triggers:
#   - Push a tag like v0.1.0 → creates a GitHub Release with binaries
#   - Manual trigger via Actions tab (workflow_dispatch)
#
# Builds:
#   - Windows x86_64 (orbis-windows-x86_64.zip)
#   - Linux x86_64 (orbis-linux-x86_64.tar.gz)
# =============================================================================

name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: orbis-windows-x86_64
            binary_name: orbis.exe
            archive_ext: zip
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: orbis-linux-x86_64
            binary_name: orbis
            archive_ext: tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxi-dev libxcursor-dev libxrandr-dev \
            libwayland-dev libxkbcommon-dev pkg-config

      - name: Build (release)
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dir = "${{ matrix.artifact_name }}"
          New-Item -ItemType Directory -Path $dir -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "$dir/"
          Copy-Item -Recurse "assets" "$dir/assets"
          Copy-Item "README.md" "$dir/" -ErrorAction SilentlyContinue
          Copy-Item "LICENSE" "$dir/" -ErrorAction SilentlyContinue
          Compress-Archive -Path $dir -DestinationPath "$dir.zip"

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          dir="${{ matrix.artifact_name }}"
          mkdir -p "$dir"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "$dir/"
          cp -r assets "$dir/"
          cp README.md "$dir/" 2>/dev/null || true
          cp LICENSE "$dir/" 2>/dev/null || true
          tar -czf "$dir.tar.gz" "$dir/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.${{ matrix.archive_ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            orbis-windows-x86_64/orbis-windows-x86_64.zip
            orbis-linux-x86_64/orbis-linux-x86_64.tar.gz
          generate_release_notes: true
